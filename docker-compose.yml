version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: tomua_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-tomua_tourism}
      POSTGRES_USER: ${DB_USER:-tomua_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tomua_admin} -d ${DB_NAME:-tomua_tourism}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tomua_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tomua_server
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-tomua_admin}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/${DB_NAME:-tomua_tourism}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,https://localhost:3443,https://*.ts.net,https://tomua-web.tail3f8970.ts.net}
      UPLOAD_DIR: /app/uploads
      REDIS_URL: redis://redis:6379
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      CTV_PASSWORD: ${CTV_PASSWORD:-ctv123456}
    volumes:
      - uploads_data:/app/uploads
      - ./client:/app/client:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tomua_nginx
    ports:
      - "3000:80"
      - "3443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client:/usr/share/nginx/html:ro
      - uploads_data:/usr/share/nginx/uploads:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tomua_tailscale
    hostname: tomua-web
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale_data:/var/lib/tailscale
      - ./tailscale/config:/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  redis_data:
  tailscale_data:
